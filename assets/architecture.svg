<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1400" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="1200" height="1400" fill="white"/>

  <!-- Title -->
  <text x="50" y="40" font-size="24" font-weight="bold" font-family="Arial">
    Music Recommender AI System Architecture
  </text>

  <!-- User Input -->
  <rect x="300" y="70" width="600" height="70" fill="#AEC2E0" stroke="#2980B9" stroke-width="2" rx="5"/>
  <text x="320" y="100" font-size="14" font-family="Arial" font-weight="bold">USER INPUT</text>
  <text x="320" y="125" font-size="12" font-family="Arial">Natural Language Music Request</text>

  <!-- Arrow down -->
  <line x1="600" y1="140" x2="600" y2="170" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Input Validation -->
  <rect x="350" y="170" width="500" height="70" fill="#90EE90" stroke="#27AE60" stroke-width="2" rx="5"/>
  <text x="370" y="200" font-size="14" font-family="Arial" font-weight="bold">GUARDRAILS: INPUT CHECK</text>
  <text x="370" y="225" font-size="12" font-family="Arial">Empty? Length? Injection patterns?</text>

  <!-- Arrow down -->
  <line x1="600" y1="240" x2="600" y2="270" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 5 Steps Header -->
  <text x="50" y="290" font-size="18" font-weight="bold" font-family="Arial">
    AGENTIC WORKFLOW (5 STEPS)
  </text>

  <!-- Step 1 -->
  <rect x="50" y="310" width="180" height="90" fill="#AEC2E0" stroke="#2980B9" stroke-width="2" rx="5"/>
  <text x="70" y="340" font-size="13" font-family="Arial" font-weight="bold">STEP 1</text>
  <text x="70" y="360" font-size="12" font-family="Arial">Parse Intent</text>
  <text x="70" y="380" font-size="11" font-family="Arial">(Claude API)</text>
  <text x="70" y="395" font-size="10" font-family="Arial">→ {genre, mood, energy}</text>

  <!-- Step 2 -->
  <rect x="260" y="310" width="180" height="90" fill="#90EE90" stroke="#27AE60" stroke-width="2" rx="5"/>
  <text x="280" y="340" font-size="13" font-family="Arial" font-weight="bold">STEP 2</text>
  <text x="280" y="360" font-size="12" font-family="Arial">RAG Retrieval</text>
  <text x="280" y="380" font-size="11" font-family="Arial">(Load docs)</text>
  <text x="280" y="395" font-size="10" font-family="Arial">→ genre/mood knowledge</text>

  <!-- Step 3 -->
  <rect x="470" y="310" width="180" height="90" fill="#AEC2E0" stroke="#2980B9" stroke-width="2" rx="5"/>
  <text x="490" y="340" font-size="13" font-family="Arial" font-weight="bold">STEP 3</text>
  <text x="490" y="360" font-size="12" font-family="Arial">Score &amp; Rank</text>
  <text x="490" y="380" font-size="11" font-family="Arial">(Recommender)</text>
  <text x="490" y="395" font-size="10" font-family="Arial">→ Top 5 songs</text>

  <!-- Step 4 -->
  <rect x="680" y="310" width="180" height="90" fill="#90EE90" stroke="#27AE60" stroke-width="2" rx="5"/>
  <text x="700" y="340" font-size="13" font-family="Arial" font-weight="bold">STEP 4</text>
  <text x="700" y="360" font-size="12" font-family="Arial">Generate Explain</text>
  <text x="700" y="380" font-size="11" font-family="Arial">(Claude API)</text>
  <text x="700" y="395" font-size="10" font-family="Arial">→ AI explanation</text>

  <!-- Step 5 -->
  <rect x="890" y="310" width="180" height="90" fill="#AEC2E0" stroke="#2980B9" stroke-width="2" rx="5"/>
  <text x="910" y="340" font-size="13" font-family="Arial" font-weight="bold">STEP 5</text>
  <text x="910" y="360" font-size="12" font-family="Arial">Validate Output</text>
  <text x="910" y="380" font-size="11" font-family="Arial">(Guardrails)</text>
  <text x="910" y="395" font-size="10" font-family="Arial">→ confidence score</text>

  <!-- Arrows connecting to steps from top -->
  <line x1="600" y1="270" x2="140" y2="310" stroke="black" stroke-width="2"/>
  <line x1="600" y1="270" x2="350" y2="310" stroke="black" stroke-width="2"/>
  <line x1="600" y1="270" x2="560" y2="310" stroke="black" stroke-width="2"/>
  <line x1="600" y1="270" x2="770" y2="310" stroke="black" stroke-width="2"/>
  <line x1="600" y1="270" x2="980" y2="310" stroke="black" stroke-width="2"/>

  <!-- Arrows connecting steps downward -->
  <line x1="140" y1="400" x2="140" y2="430" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="400" x2="350" y2="430" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="400" x2="560" y2="430" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="770" y1="400" x2="770" y2="430" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="980" y1="400" x2="980" y2="430" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Knowledge Base -->
  <text x="50" y="460" font-size="14" font-weight="bold" font-family="Arial">Knowledge Base (RAG):</text>
  <rect x="50" y="480" width="1100" height="110" fill="#F0F8FF" stroke="#95A5A6" stroke-width="2" rx="5"/>
  <text x="70" y="510" font-size="12" font-family="monospace">data/knowledge/</text>
  <text x="90" y="535" font-size="11" font-family="monospace">• Genres (6 docs): lofi, pop, rock, edm, ambient, jazz</text>
  <text x="90" y="560" font-size="11" font-family="monospace">• Moods (3 docs): chill, intense, happy</text>
  <text x="90" y="575" font-size="11" font-family="monospace">• Provides context for explanation generation (prevents hallucination)</text>

  <!-- Final Output -->
  <text x="50" y="650" font-size="18" font-weight="bold" font-family="Arial">FINAL OUTPUT</text>
  <rect x="100" y="670" width="1000" height="140" fill="#AEC2E0" stroke="#2980B9" stroke-width="2" rx="5"/>
  <text x="120" y="700" font-size="12" font-family="monospace">✨ Top 5 Recommendations</text>
  <text x="140" y="725" font-size="11" font-family="monospace">   1. Song Title — Artist (genre: lofi, mood: chill, score: 9.0/10.5)</text>
  <text x="140" y="745" font-size="11" font-family="monospace">   2. ...</text>
  <text x="120" y="770" font-size="12" font-family="monospace">💭 Why: [AI-generated explanation based on song scores and RAG context]</text>
  <text x="120" y="795" font-size="12" font-family="monospace">📊 Confidence: 0.86 (86%)  [⚠️  Warning if &lt; 0.7]</text>

  <!-- Testing Layer -->
  <text x="50" y="870" font-size="18" font-weight="bold" font-family="Arial">EVALUATION &amp; TESTING</text>

  <rect x="50" y="890" width="550" height="110" fill="#FFE5B4" stroke="#E67E22" stroke-width="2" rx="5"/>
  <text x="70" y="920" font-size="12" font-weight="bold" font-family="Arial">Automated Tests</text>
  <text x="70" y="945" font-size="11" font-family="monospace">• test_recommender.py: 2 unit tests (PASSED)</text>
  <text x="70" y="965" font-size="11" font-family="monospace">• test_evaluation.py: 5 scenarios (chill, workout, happy, etc.)</text>
  <text x="70" y="985" font-size="11" font-family="monospace">• Batch mode: 4 original profiles (working)</text>

  <rect x="650" y="890" width="550" height="110" fill="#FFE5B4" stroke="#E67E22" stroke-width="2" rx="5"/>
  <text x="670" y="920" font-size="12" font-weight="bold" font-family="Arial">Human Review</text>
  <text x="670" y="945" font-size="11" font-family="monospace">• Spot-check explanations for clarity</text>
  <text x="670" y="965" font-size="11" font-family="monospace">• Verify confidence scores align with quality</text>
  <text x="670" y="985" font-size="11" font-family="monospace">• Test edge cases (high-energy + sad, etc.)</text>

  <!-- How to Run -->
  <text x="50" y="1050" font-size="14" font-weight="bold" font-family="Arial">How to Run:</text>
  <rect x="50" y="1070" width="1100" height="100" fill="#F5F5F5" stroke="#7F8C8D" stroke-width="1" rx="3"/>
  <text x="70" y="1095" font-size="11" font-family="monospace">Batch mode (no API key):     python3 -m src.main --batch</text>
  <text x="70" y="1120" font-size="11" font-family="monospace">Interactive mode:             python3 -m src.main</text>
  <text x="70" y="1145" font-size="11" font-family="monospace">Full evaluation:              pytest tests/test_evaluation.py -v</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="black"/>
    </marker>
  </defs>
</svg>
